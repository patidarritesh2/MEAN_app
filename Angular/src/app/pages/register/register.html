<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Create Account</h2>
        <p class="subtitle">Register to get started</p>

        <form (ngSubmit)="register()" #form="ngForm">

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" [(ngModel)]="user.username" required placeholder="Choose username" />
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" [(ngModel)]="user.password" required minlength="6"
                    placeholder="Minimum 6 characters" />
            </div>

            <button type="submit" [disabled]="form.invalid || loading">
                {{ loading ? 'Registering...' : 'Register' }}
            </button>

        </form>

        <p *ngIf="errorMessage" class="error">
            {{ errorMessage }}
        </p>

        <div class="redirect">
            Already have an account?
            <a routerLink="/login">Login</a>
        </div>
    </div>
</div>
